name: Build and Deploy to ECR

on:
  release:
    types: [created]

jobs:
  build:
    environment: production
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
        | docker login --username AWS \
        --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

    - name: Build, tag, and push image to Amazon ECR
      run: |
        TAG=${{ github.event.release.tag_name }}
        APP_NAME=kafka-consumer
        IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$APP_NAME:$TAG

        docker build -t $APP_NAME:$TAG .
        docker tag $APP_NAME:$TAG $IMAGE_URI
        docker push $IMAGE_URI
